name: Terraform Azure Deploy

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read


name: Azure Login
uses: Azure/login@v2
with:
    client-id: ${{ secrets.AZURE_CLIENT_ID }}
    tenant-id: ${{ secrets.AZURE_TENANT_ID }}
    subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
